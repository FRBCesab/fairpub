url: https://frbcesab.github.io/fairpub/

template:
  bootstrap: 5

reference:
- title: Fairness and citation metrics
  desc: |
    Functions to retrieve the fairness status of an article/journal and to
    compute the citation ratio from a list of articles.
  contents:
  - fp_get_article_fairness
  - fp_get_journal_fairness
  - fp_compute_citation_ratio

- title: OpenAlex API interface
  desc: |
    Functions to query the OpenAlex database and retrieve bibliographic
    information about authors, journals and publications.
  contents:
  - fp_get_openalex_author
  - fp_get_openalex_doi

- title: DOI utilities
  desc: |
    Functions to extract and clean DOIs from BibTeX files or character vectors.
  contents:
  - fp_extract_doi
  - fp_clean_doi

- title: DAFNEE database
  desc: |
    Function to retrieve the list of journals included in the DAFNEE database.
  contents:
  - fp_list_dafnee_journals
